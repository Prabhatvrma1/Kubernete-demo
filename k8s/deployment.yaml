apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubernete-demo-api
  labels:
    app: kubernete-demo-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kubernete-demo-api

  template:
    metadata:
      labels:
        app: kubernete-demo-api

    spec:
      containers:
        - name: kubernete-demo-api
          image: prabhatsoni16/kubernete-demo-api:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "production"

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthy
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20